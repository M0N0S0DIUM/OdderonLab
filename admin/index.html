<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Odderon Lab — Content Manager</title>
  <style>html,body{margin:0;height:100%;background:#111;color:#eee;font-family:sans-serif}#nc-root{height:100%}</style>
</head>
<body>
  <div id="nc-root"></div>
  <script>
    window.decapCmsCallbacks = [];
    window.decapCmsReady = function(callback) {
      window.decapCmsCallbacks.push(callback);
    };
  </script>
  <script src="https://unpkg.com/decap-cms@3.3.1/dist/decap-cms.js" defer></script>
  <script defer>
    // Initialize with explicit config path
    if (window.CMS) {
      window.CMS.init();
    } else {
      window.decapCmsCallbacks.push(function() {
        window.CMS.init();
      });
    }
  </script>
</body>
</html>
