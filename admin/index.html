<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Odderon Lab — Content Manager</title>
  <script src="https://unpkg.com/decap-cms@3.3.1/dist/decap-cms.js"></script>
</head>
<body>
  <div id="decap-cms-root"></div>
  <script>
    console.log('Admin page loading...', { 
      DecapCMS: typeof window.DecapCMS, 
      decapCMS: typeof window.decapCMS,
      DecapCMS: window.DecapCMS
    });
    
    // Wait for DecapCMS to load
    function checkDecapCMS() {
      if (window.DecapCMS) {
        console.log('DecapCMS found, initializing...');
        window.DecapCMS.init({ config: { load_config_file: true } });
      } else if (window.decapCMS) {
        console.log('decapCMS found (lowercase), initializing...');
        window.decapCMS.init({ config: { load_config_file: true } });
      } else {
        console.log('DecapCMS not yet loaded, retrying in 100ms...');
        setTimeout(checkDecapCMS, 100);
      }
    }
    
    checkDecapCMS();
    
    // Global error handlers
    window.addEventListener('error', (e) => {
      console.error('Global error:', e.message, e.filename, e.lineno, e.colno, e.error);
      document.body.innerHTML += `<pre style="color:red;padding:20px;background:#111;">JS Error: ${e.message}\n${e.filename}:${e.lineno}</pre>`;
    });
    
    window.addEventListener('unhandledrejection', (e) => {
      console.error('Unhandled rejection:', e.reason);
      document.body.innerHTML += `<pre style="color:red;padding:20px;background:#111;">Unhandled: ${e.reason}</pre>`;
    });
  </script>
</body>
</html>
