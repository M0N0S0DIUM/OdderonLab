<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Odderon Lab — Content Manager</title>
</head>
<body>
  <div id="decap-cms-root"></div>
  <div id="status" style="padding:20px;color:#fff;font-family:monospace;"></div>
  <script>
    function setStatus(msg, isError = false) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.style.color = isError ? '#ff6b6b' : '#00ff99';
    }

    function log(msg) {
      console.log('[Admin]', msg);
      setStatus(msg);
    }

    function logError(msg, err) {
      console.error('[Admin Error]', msg, err);
      setStatus(msg + (err ? ': ' + err.message : ''), true);
    }

    log('Admin page loading...');

    function checkGlobals() {
      const globals = {};
      ['CMS', 'NetlifyCMS', 'DecapCMS', 'decapCMS', 'decapCms', 'netlifyCMS'].forEach(name => {
        if (window[name]) globals[name] = typeof window[name];
      });
      return globals;
    }

    let retries = 0;
    const maxRetries = 100;

    function checkCMS() {
      const globals = checkGlobals();
      log('Globals check: ' + JSON.stringify(globals));

      if (window.CMS) {
        log('CMS found, initializing...');
        try {
          window.CMS.init({ config: { load_config_file: true } });
          log('CMS init called successfully');
        } catch (e) {
          logError('CMS init failed: ' + e.message, e);
        }
      } else if (window.NetlifyCMS) {
        log('NetlifyCMS found, initializing...');
        try {
          window.NetlifyCMS.init({ config: { load_config_file: true } });
          log('NetlifyCMS init called successfully');
        } catch (e) {
          logError('NetlifyCMS init failed: ' + e.message, e);
        }
      } else if (window.DecapCMS) {
        log('DecapCMS found, initializing...');
        try {
          window.DecapCMS.init({ config: { load_config_file: true } });
          log('DecapCMS init called successfully');
        } catch (e) {
          logError('DecapCMS init failed: ' + e.message, e);
        }
      } else if (window.decapCMS) {
        log('decapCMS found (lowercase), initializing...');
        try {
          window.decapCMS.init({ config: { load_config_file: true } });
          log('decapCMS init called successfully');
        } catch (e) {
          logError('decapCMS init failed: ' + e.message, e);
        }
      } else {
        retries++;
        if (retries < 100) {
          log('CMS not loaded, retry ' + retries + '/100...');
          setTimeout(checkCMS, 100);
        } else {
          logError('CMS failed to load after 10 seconds. Available globals: ' + JSON.stringify(checkGlobals()));
        }
      }
    }

    const script = document.querySelector('script[src*="netlify-cms"], script[src*="decap-cms"]');
    if (script) {
      if (script.readyState === 'complete' || script.readyState === 'loaded') {
        log('Script already loaded, starting check...');
        setTimeout(checkCMS, 50);
      } else {
        script.onload = function() {
          log('Script loaded, checking globals...');
          setTimeout(checkCMS, 50);
        };
        script.onerror = function() {
          logError('Script failed to load');
        };
      }
    } else {
      setTimeout(checkCMS, 50);
    }

    window.addEventListener('error', (e) => {
      console.error('[Admin Error]', e.message, e.filename, e.lineno, e.colno, e.error);
      setStatus('JS Error: ' + e.message + '\n' + e.filename + ':' + e.lineno, true);
    });

    window.addEventListener('unhandledrejection', (e) => {
      console.error('[Admin Error] Unhandled rejection:', e.reason);
      setStatus('Unhandled: ' + e.reason, true);
    });
  </script>
  <script src="https://unpkg.com/decap-cms@3.3.1/dist/decap-cms.js"></script>
</body>
</html>
