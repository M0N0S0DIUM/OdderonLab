# Decap CMS Configuration for Odderon Lab
# Visit /admin/ on your site to access the CMS

backend:
  name: github
  repo: msg33/OdderonLab
  branch: main
  auth_type: github
  proxy_url: https://decap-cms-proxy.noobreaper333.workers.dev
  base_url: https://odderonlab.com
  site_domain: odderonlab.com

media_folder: "images"
public_folder: "/images"

site_url: https://odderonlab.com

collections:
  - name: "posts"
    label: "Lab Notes"
    folder: "posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "post.njk"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", time_format: false}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Draft", name: "draft", widget: "boolean", default: false}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "pages"
    label: "Pages"
    files:
      - name: "index"
        label: "Homepage"
        file: "index.njk"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "base.njk"}
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Description", name: "description", widget: "text"}
      - name: "products"
        label: "Products"
        file: "products.njk"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "base.njk"}
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Description", name: "description", widget: "text"}
      - name: "about"
        label: "About"
        file: "about.njk"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "base.njk"}
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Description", name: "description", widget: "text"}
      - name: "labnotes"
        label: "Lab Notes Index"
        file: "labnotes.njk"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "base.njk"}
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Description", name: "description", widget: "text"}